<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>タッチザナンバー</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #1a1a2e; color: #eee;
      height: 100dvh; display: flex; flex-direction: column;
      overflow: hidden; user-select: none;
    }
    /* ── ヘッダー ── */
    #header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px;
      background: rgba(255,255,255,.05);
      border-bottom: 1px solid rgba(255,255,255,.1);
      flex-shrink: 0; gap: 10px;
    }
    #title { font-size:16px; font-weight:700; letter-spacing:.05em; color:#e94560; flex-shrink:0; }
    #sound-controls { display:flex; gap:6px; flex-shrink:0; }
    .sound-btn {
      width:34px; height:34px; border-radius:50%;
      border:1.5px solid rgba(255,255,255,.2);
      background:rgba(255,255,255,.06);
      font-size:15px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background .15s, border-color .15s, opacity .15s; color:#fff;
    }
    .sound-btn.off { opacity:.35; border-color:rgba(255,255,255,.1); }
    .sound-btn:hover { background:rgba(255,255,255,.12); }
    #scores { display:flex; gap:14px; flex-shrink:0; }
    .score-item { display:flex; flex-direction:column; align-items:center; }
    .score-label { font-size:10px; color:#888; text-transform:uppercase; letter-spacing:.05em; }
    .score-value { font-size:15px; font-weight:700; color:#fff; font-variant-numeric:tabular-nums; }
    #best-value { color:#ffd700; }
    /* ── ステータスバー ── */
    #status-bar {
      display:flex; align-items:center; padding:7px 14px;
      background:rgba(255,255,255,.03); flex-shrink:0; gap:8px;
    }
    #next-label { font-size:12px; color:#888; }
    #next-number { font-size:21px; font-weight:900; color:#e94560; min-width:34px; text-align:center; }
    #progress-bar-wrap { flex:1; height:6px; background:rgba(255,255,255,.1); border-radius:3px; }
    #progress-bar {
      height:100%; background:linear-gradient(90deg,#e94560,#ff9f43);
      border-radius:3px; width:0%; transition:width .2s ease;
    }
    /* リタイアボタン */
    #retire-btn {
      width:30px; height:30px; border-radius:6px;
      border:1.5px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.05);
      font-size:13px; cursor:pointer; color:#aaa; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      transition:background .15s, border-color .15s, color .15s;
    }
    #retire-btn:not(:disabled):hover { background:rgba(233,69,96,.2); border-color:#e94560; color:#e94560; }
    #retire-btn:disabled { opacity:.2; cursor:default; }
    /* ── プレイエリア ── */
    #play-area { flex:1; position:relative; overflow:hidden; }
    /* ── 数字ボタン ── */
    .num-btn {
      position:absolute; width:52px; height:52px; border-radius:50%;
      border:none; font-size:18px; font-weight:900; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,#16213e,#0f3460);
      color:#c8d6e5;
      box-shadow:0 4px 12px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.1);
      touch-action:manipulation; transition:transform .1s, box-shadow .1s;
    }
    .num-btn:hover { transform:scale(1.08); box-shadow:0 6px 20px rgba(233,69,96,.3),inset 0 1px 0 rgba(255,255,255,.15); }
    .num-btn:active { transform:scale(.94); }
    .num-btn.wrong { animation:shake .35s ease; background:linear-gradient(135deg,#5c0011,#8b0000)!important; color:#ff6b6b!important; }
    .num-btn.correct { animation:pop-out .3s ease forwards; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px) rotate(-3deg)}
      40%{transform:translateX(8px) rotate(3deg)} 60%{transform:translateX(-5px) rotate(-2deg)}
      80%{transform:translateX(5px) rotate(2deg)}
    }
    @keyframes pop-out {
      0%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:.8} 100%{transform:scale(0);opacity:0}
    }
    /* ── オーバーレイ ── */
    #overlay {
      position:absolute; inset:0;
      background:rgba(26,26,46,.93);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:18px; backdrop-filter:blur(4px); transition:opacity .3s; z-index:30;
    }
    #overlay.hidden { opacity:0; pointer-events:none; }
    #overlay-title { font-size:28px; font-weight:900; color:#e94560; letter-spacing:.05em; }
    #overlay-result { font-size:15px; color:#aaa; text-align:center; line-height:1.8; min-height:50px; }
    #overlay-result .result-time { font-size:40px; font-weight:900; color:#fff; display:block; }
    #overlay-result .new-best { color:#ffd700; font-size:15px; font-weight:700; }
    .btn-group { display:flex; gap:10px; }
    .group-label { font-size:11px; color:#666; text-align:center; letter-spacing:.05em; text-transform:uppercase; }
    .sel-btn {
      padding:8px 18px; border-radius:20px;
      border:2px solid rgba(255,255,255,.2);
      background:transparent; color:#aaa;
      font-size:14px; font-weight:600; cursor:pointer; transition:all .15s;
    }
    .sel-btn.active { border-color:#e94560; color:#e94560; background:rgba(233,69,96,.1); }
    #start-btn {
      padding:14px 48px; font-size:18px; font-weight:800;
      background:linear-gradient(135deg,#e94560,#c0392b);
      color:#fff; border:none; border-radius:50px; cursor:pointer;
      letter-spacing:.08em; box-shadow:0 6px 24px rgba(233,69,96,.5);
      transition:transform .1s, box-shadow .1s, opacity .2s;
    }
    #start-btn:hover  { transform:scale(1.05); box-shadow:0 8px 30px rgba(233,69,96,.65); }
    #start-btn:active { transform:scale(.97); }
    #start-btn:disabled { opacity:.5; cursor:default; transform:none; }
    /* カウントダウン */
    #countdown {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      font-size:100px; font-weight:900; color:#e94560; pointer-events:none; opacity:0; z-index:20;
    }
    #countdown.show { animation:count-anim .7s ease-out forwards; }
    @keyframes count-anim { 0%{opacity:1;transform:scale(1.5)} 100%{opacity:0;transform:scale(.5)} }
    /* 正解エフェクト */
    .hit-effect {
      position:absolute; pointer-events:none; font-size:20px; font-weight:900; color:#ffd700;
      animation:float-up .6s ease forwards; z-index:25;
    }
    @keyframes float-up { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-40px) scale(1.3)} }
  </style>
</head>
<body>

<div id="header">
  <div id="title">タッチザナンバー</div>
  <div id="sound-controls">
    <button class="sound-btn" id="sfx-btn" title="効果音 ON/OFF">🔊</button>
    <button class="sound-btn off" id="bgm-btn" title="BGM ON/OFF（ゲーム中に再生）">🎵</button>
  </div>
  <div id="scores">
    <div class="score-item"><span class="score-label">タイム</span><span class="score-value" id="timer-display">0.00</span></div>
    <div class="score-item"><span class="score-label">ベスト</span><span class="score-value" id="best-value">--</span></div>
  </div>
</div>

<div id="status-bar">
  <span id="next-label">次:</span>
  <span id="next-number">1</span>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <button id="retire-btn" title="リタイア" disabled>⏹</button>
</div>

<div id="play-area">
  <div id="countdown"></div>
  <div id="overlay">
    <div id="overlay-title">タッチザナンバー</div>
    <div id="overlay-result">1から順番にタップ！</div>
    <div>
      <div class="group-label" style="margin-bottom:6px">モード</div>
      <div class="btn-group" id="mode-select">
        <button class="sel-btn active" data-count="16">4×4</button>
        <button class="sel-btn" data-count="25">5×5</button>
        <button class="sel-btn" data-count="36">6×6</button>
      </div>
    </div>
    <div>
      <div class="group-label" style="margin-bottom:6px">配置</div>
      <div class="btn-group" id="layout-select">
        <button class="sel-btn active" data-layout="grid">グリッド</button>
        <button class="sel-btn" data-layout="random">ランダム</button>
      </div>
    </div>
    <button id="start-btn">スタート</button>
  </div>
</div>

<script>
// ── DOM refs ──────────────────────────────────────────────
const playArea      = document.getElementById('play-area');
const overlay       = document.getElementById('overlay');
const overlayTitle  = document.getElementById('overlay-title');
const overlayResult = document.getElementById('overlay-result');
const startBtn      = document.getElementById('start-btn');
const nextNumber    = document.getElementById('next-number');
const progressBar   = document.getElementById('progress-bar');
const timerDisplay  = document.getElementById('timer-display');
const bestValue     = document.getElementById('best-value');
const countdownEl   = document.getElementById('countdown');
const sfxBtn        = document.getElementById('sfx-btn');
const bgmBtn        = document.getElementById('bgm-btn');
const retireBtn     = document.getElementById('retire-btn');

// ── 状態 ─────────────────────────────────────────────────
let totalCount  = 16;
let layoutMode  = 'grid';
let current     = 1;
let startTime   = null;
let timerRAF    = null;
let playing     = false;
let starting    = false;
let cdToken     = 0;   // カウントダウン世代番号（リタイア時にインクリメントで無効化）
let sfxOn       = true;
let bgmEnabled  = false; // ゲーム中BGMを鳴らすか（デフォルトOFF）
let bests       = loadBests();

// ── LocalStorage ─────────────────────────────────────────
function loadBests() {
  const def = {16:null, 25:null, 36:null};
  try {
    const raw = JSON.parse(localStorage.getItem('ttn_bests'));
    if (!raw || typeof raw !== 'object' || Array.isArray(raw)) return def;
    const valid = (v) => (typeof v === 'number' && v > 0) ? v : null;
    return { 16: valid(raw[16]), 25: valid(raw[25]), 36: valid(raw[36]) };
  } catch(_) { return def; }
}
function saveBests() {
  try { localStorage.setItem('ttn_bests', JSON.stringify(bests)); } catch(_) {}
}

// ══════════════════════════════════════════════════════════
// ── Web Audio ─────────────────────────────────────────────
// ══════════════════════════════════════════════════════════
let sharedCtx = null;
function getCtx() {
  if (!sharedCtx) sharedCtx = new (window.AudioContext || window.webkitAudioContext)();
  return sharedCtx;
}
async function ensureAudio() {
  const ctx = getCtx();
  if (ctx.state !== 'running') await ctx.resume();
  return ctx;
}

// ── SFX ──────────────────────────────────────────────────
function beep(freq, dur, type='sine', vol=0.25, delay=0) {
  if (!sfxOn) return;
  const ctx = getCtx();
  if (ctx.state !== 'running') return;
  try {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    const t = ctx.currentTime + delay;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.start(t); osc.stop(t + dur + 0.01);
  } catch(e) { console.warn('SFX error:', e); }
}
const sfx = {
  correct : () => beep(880, 0.08, 'sine',     0.28),
  wrong   : () => beep(160, 0.18, 'sawtooth', 0.15),
  tick    : () => beep(440, 0.10, 'sine',     0.18),
  go      : () => { beep(660, 0.10, 'sine', 0.25); beep(990, 0.15, 'sine', 0.28, 0.10); },
  finish  : () => [523,659,784,1047].forEach((f,i) => beep(f, 0.18, 'sine', 0.28, i*0.10)),
};

sfxBtn.addEventListener('click', async () => {
  try { await ensureAudio(); } catch(e) { console.warn('Audio resume failed:', e); }
  sfxOn = !sfxOn;
  sfxBtn.textContent = sfxOn ? '🔊' : '🔇';
  sfxBtn.classList.toggle('off', !sfxOn);
});

// ══════════════════════════════════════════════════════════
// ── BGM System（3曲 + ドラム）────────────────────────────
// ── モード別: 4×4=Pop110, 5×5=Funk128, 6×6=Rush150 ─────
// ══════════════════════════════════════════════════════════
const BGMSystem = (() => {
  // ── 音程定数 ─────────────────────────────────────────
  const C3=130.81,D3=146.83,E3=164.81,F3=174.61,Fs3=184.99,G3=196.00,Gs3=207.65,A3=220.00,B3=246.94;
  const C4=261.63,Cs4=277.18,D4=293.66,E4=329.63,F4=349.23,Fs4=369.99,G4=392.00,Gs4=415.30,A4=440.00,B4=493.88;
  const C5=523.25,Cs5=554.37,D5=587.33,E5=659.25,F5=698.46,Fs5=739.99,G5=783.99,A5=880.00,B5=987.77;

  // ── 状態 ──────────────────────────────────────────────
  let master = null, loopAt = 0, timer = null, on = false, track = 0;
  const AHEAD = 0.35;

  // ── ノイズバッファ（ドラム用）─────────────────────────
  let noiseBuf = null;
  function getNoise(ctx) {
    if (!noiseBuf) {
      const len = ctx.sampleRate >> 1;
      noiseBuf = ctx.createBuffer(1, len, ctx.sampleRate);
      const d = noiseBuf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    }
    return noiseBuf;
  }

  // ── 楽器スケジューラ ──────────────────────────────────
  function tone(freq, beat, dur, type, vol, S) {
    if (!on || !master) return;
    const ctx = getCtx(), t = loopAt + beat * S;
    if (t < ctx.currentTime - 0.01) return;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = type; osc.frequency.value = freq;
    osc.connect(g); g.connect(master);
    g.gain.setValueAtTime(0.001, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur * S - 0.02);
    osc.start(t); osc.stop(t + dur * S + 0.01);
  }
  function kick(beat, S, vol=0.7) {
    if (!on || !master) return;
    const ctx = getCtx(), t = loopAt + beat * S;
    if (t < ctx.currentTime - 0.01) return;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(master); osc.type = 'sine';
    osc.frequency.setValueAtTime(180, t);
    osc.frequency.exponentialRampToValueAtTime(48, t + 0.15);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    osc.start(t); osc.stop(t + 0.32);
  }
  function snare(beat, S, vol=0.26) {
    if (!on || !master) return;
    const ctx = getCtx(), t = loopAt + beat * S;
    if (t < ctx.currentTime - 0.01) return;
    const ns = ctx.createBufferSource(); ns.buffer = getNoise(ctx); ns.loop = true;
    const flt = ctx.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=2500; flt.Q.value=1.2;
    const g = ctx.createGain();
    ns.connect(flt); flt.connect(g); g.connect(master);
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.13);
    ns.start(t); ns.stop(t + 0.16);
  }
  function hat(beat, S, vol=0.10) {
    if (!on || !master) return;
    const ctx = getCtx(), t = loopAt + beat * S;
    if (t < ctx.currentTime - 0.01) return;
    const ns = ctx.createBufferSource(); ns.buffer = getNoise(ctx); ns.loop = true;
    const flt = ctx.createBiquadFilter(); flt.type='highpass'; flt.frequency.value=8000;
    const g = ctx.createGain();
    ns.connect(flt); flt.connect(g); g.connect(master);
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    ns.start(t); ns.stop(t + 0.06);
  }

  // ────────────────────────────────────────────────────────
  // TRACK 0: "Breezy Pop" — C major, 110 BPM, 16拍ループ
  // 4×4モード向け。明るく親しみやすい。
  // ────────────────────────────────────────────────────────
  function schedulePop(S) {
    const mel = [
      [E5,0,.45],[G5,.5,.4],[E5,1,.4],[C5,1.5,.4],
      [D5,2,.4],[E5,2.5,.4],[G5,3,.4],[E5,3.5,.4],
      [A5,4,.45],[E5,4.5,.4],[C5,5,.4],[E5,5.5,.4],
      [A4,6,.4],[C5,6.5,.4],[B4,7,.4],[A4,7.5,.4],
      [F5,8,.45],[C5,8.5,.4],[A4,9,.4],[C5,9.5,.4],
      [F4,10,.4],[A4,10.5,.4],[G4,11,.4],[A4,11.5,.4],
      [G5,12,.45],[D5,12.5,.4],[B4,13,.4],[D5,13.5,.4],
      [G4,14,.4],[B4,14.5,.4],[A4,15,.4],[G4,15.5,.4],
    ];
    const bass = [
      [C3,0,0.9],[G3,.5,.9],[C3,1,.9],[E3,1.5,.9],
      [C3,2,.9],[G3,2.5,.9],[A3,3,.9],[G3,3.5,.9],
      [A3,4,.9],[E3,4.5,.9],[A3,5,.9],[C4,5.5,.9],
      [G3,6,.9],[E3,6.5,.9],[A3,7,.9],[G3,7.5,.9],
      [F3,8,.9],[C4,8.5,.9],[F3,9,.9],[A3,9.5,.9],
      [F3,10,.9],[C4,10.5,.9],[G3,11,.9],[F3,11.5,.9],
      [G3,12,.9],[D4,12.5,.9],[G3,13,.9],[B3,13.5,.9],
      [G3,14,.9],[D4,14.5,.9],[G3,15,.9],[F3,15.5,.9],
    ];
    const chords = [
      [[C4,E4,G4],0,3.8],[[A3,C4,E4],4,3.8],
      [[F3,A3,C4],8,3.8],[[G3,B3,D4],12,3.8],
    ];
    mel.forEach(([f,b,d])     => tone(f,b,d,'square',0.055,S));
    bass.forEach(([f,b,d])    => tone(f,b,d,'sine',0.080,S));
    chords.forEach(([ns,b,d]) => ns.forEach(f => tone(f,b,d,'triangle',0.025,S)));
    // Kick on 0,2,4,... / Snare on 1,3,5,...
    for (let i=0; i<16; i+=2) kick(i,S);
    for (let i=1; i<16; i+=2) snare(i,S);
  }

  // ────────────────────────────────────────────────────────
  // TRACK 1: "Funk Rush" — D major, 128 BPM, 16拍ループ
  // 5×5モード向け。シンコペ＋ハイハット、ノリ重視。
  // ────────────────────────────────────────────────────────
  function scheduleFunk(S) {
    const mel = [
      [D5,0,.38],[Fs5,.5,.38],[A5,1,.38],[Fs5,1.5,.38],
      [D5,2,.38],[A4,2.5,.38],[Fs5,3,.38],[E5,3.5,.38],
      [B4,4,.38],[D5,4.5,.38],[Fs5,5,.38],[D5,5.5,.38],
      [B4,6,.38],[Fs4,6.5,.38],[A4,7,.38],[B4,7.5,.38],
      [G5,8,.38],[D5,8.5,.38],[B4,9,.38],[D5,9.5,.38],
      [G4,10,.38],[B4,10.5,.38],[A4,11,.38],[G4,11.5,.38],
      [A5,12,.38],[E5,12.5,.38],[Cs5,13,.38],[E5,13.5,.38],
      [A4,14,.38],[Cs5,14.5,.38],[B4,15,.38],[A4,15.5,.38],
    ];
    // シンコペベース
    const bass = [
      [D3,0,.4],[D3,.75,.4],[Fs3,1,.4],[A3,1.5,.4],
      [D3,2,.4],[A3,2.5,.4],[Fs3,3,.4],[E3,3.5,.4],
      [B3,4,.4],[B3,4.75,.4],[D4,5,.4],[Fs4,5.5,.4],
      [B3,6,.4],[Fs3,6.5,.4],[A3,7,.4],[G3,7.5,.4],
      [G3,8,.4],[G3,8.75,.4],[B3,9,.4],[D4,9.5,.4],
      [G3,10,.4],[D4,10.5,.4],[B3,11,.4],[A3,11.5,.4],
      [A3,12,.4],[A3,12.75,.4],[Cs4,13,.4],[E4,13.5,.4],
      [A3,14,.4],[E4,14.5,.4],[Cs4,15,.4],[B3,15.5,.4],
    ];
    const chords = [
      [[D4,Fs4,A4],0,3.8],[[B3,D4,Fs4],4,3.8],
      [[G3,B3,D4],8,3.8],[[A3,Cs4,E4],12,3.8],
    ];
    mel.forEach(([f,b,d])     => tone(f,b,d,'square',0.060,S));
    bass.forEach(([f,b,d])    => tone(f,b,d,'sine',0.085,S));
    chords.forEach(([ns,b,d]) => ns.forEach(f => tone(f,b,d,'triangle',0.026,S)));
    // Kick: シンコペ (0, 2, 2.5, 3.5 を1小節単位で繰り返し)
    [0,2,2.5,3.5, 4,6,6.5,7.5, 8,10,10.5,11.5, 12,14,14.5,15.5].forEach(b => kick(b,S,0.68));
    // Snare on 1,3,5,...
    for (let i=1; i<16; i+=2) snare(i,S,0.28);
    // Hi-hat 8th notes
    for (let i=0; i<16; i+=.5) hat(i,S,0.10);
  }

  // ────────────────────────────────────────────────────────
  // TRACK 2: "Speed Rush" — A minor, 150 BPM, 16拍ループ
  // 6×6モード向け。16分音符メロディ＋激しいドラム。
  // ────────────────────────────────────────────────────────
  function scheduleRush(S) {
    const mel = [
      // Am - 16分音符ランニング
      [A4,0,.20],[C5,.25,.20],[E5,.5,.20],[A5,.75,.20],
      [G5,1,.20],[E5,1.25,.20],[C5,1.5,.20],[A4,1.75,.20],
      [E5,2,.20],[C5,2.25,.20],[A4,2.5,.20],[G4,2.75,.20],
      [A4,3,.20],[C5,3.25,.20],[E5,3.5,.20],[G5,3.75,.20],
      // Dm
      [F5,4,.20],[A5,4.25,.20],[D5,4.5,.20],[F5,4.75,.20],
      [A4,5,.20],[D5,5.25,.20],[F5,5.5,.20],[A5,5.75,.20],
      [G5,6,.20],[F5,6.25,.20],[D5,6.5,.20],[A4,6.75,.20],
      [F4,7,.20],[A4,7.25,.20],[C5,7.5,.20],[F5,7.75,.20],
      // C major
      [E5,8,.20],[G5,8.25,.20],[C5,8.5,.20],[E5,8.75,.20],
      [G5,9,.20],[E5,9.25,.20],[C5,9.5,.20],[G4,9.75,.20],
      [C5,10,.20],[E5,10.25,.20],[G5,10.5,.20],[C5,10.75,.20],
      [B4,11,.20],[G4,11.25,.20],[E4,11.5,.20],[G4,11.75,.20],
      // E major (導音: G#)
      [E5,12,.20],[Gs4,12.25,.20],[B4,12.5,.20],[E5,12.75,.20],
      [Gs4,13,.20],[B4,13.25,.20],[E5,13.5,.20],[Gs4,13.75,.20],
      [B4,14,.20],[E5,14.25,.20],[Gs4,14.5,.20],[B4,14.75,.20],
      [A4,15,.20],[G4,15.25,.20],[E4,15.5,.20],[A4,15.75,.20],
    ];
    // 8分音符ウォーキングベース
    const bass = [
      [A3,0,.45],[E3,.5,.45],[A3,1,.45],[C4,1.5,.45],
      [E4,2,.45],[C4,2.5,.45],[A3,3,.45],[G3,3.5,.45],
      [D4,4,.45],[A3,4.5,.45],[D3,5,.45],[F3,5.5,.45],
      [A3,6,.45],[F3,6.5,.45],[D3,7,.45],[A3,7.5,.45],
      [C4,8,.45],[G3,8.5,.45],[C3,9,.45],[E3,9.5,.45],
      [G3,10,.45],[C4,10.5,.45],[B3,11,.45],[G3,11.5,.45],
      [E4,12,.45],[B3,12.5,.45],[E3,13,.45],[Gs3,13.5,.45],
      [B3,14,.45],[E4,14.5,.45],[A3,15,.45],[E3,15.5,.45],
    ];
    const chords = [
      [[A3,C4,E4],0,3.8],[[D4,F4,A4],4,3.8],
      [[C4,E4,G4],8,3.8],[[E4,Gs4,B4],12,3.8],
    ];
    mel.forEach(([f,b,d])     => tone(f,b,d,'square',0.055,S));
    bass.forEach(([f,b,d])    => tone(f,b,d,'sine',0.085,S));
    chords.forEach(([ns,b,d]) => ns.forEach(f => tone(f,b,d,'triangle',0.022,S)));
    // Four-on-the-floor kick
    for (let i=0; i<16; i++) kick(i,S,0.65);
    // Snare on 1,3,5,...
    for (let i=1; i<16; i+=2) snare(i,S,0.30);
    // Hi-hat 16分音符
    for (let i=0; i<16; i+=.25) hat(i,S,0.09);
  }

  const SCHEDULERS = [schedulePop, scheduleFunk, scheduleRush];
  const TEMPOS     = [110, 128, 150];

  function scheduleLoop() {
    const S = 60 / TEMPOS[track];
    SCHEDULERS[track](S);
    loopAt += 16 * S;
    const delay = (loopAt - getCtx().currentTime - AHEAD) * 1000;
    timer = setTimeout(() => { if (on) scheduleLoop(); }, Math.max(50, delay));
  }

  // trackIndex: 0=Pop, 1=Funk, 2=Rush
  function start(trackIndex) {
    stop(); // 既存を停止してから開始
    track = trackIndex ?? 0;
    on = true;
    try {
      const ctx = getCtx();
      noiseBuf = null; // コンテキスト変化時のリセット
      master = ctx.createGain();
      master.gain.value = 0.65;
      master.connect(ctx.destination);
      loopAt = ctx.currentTime + 0.20;
      scheduleLoop();
      return true;
    } catch(e) {
      on = false;
      console.warn('BGM start error:', e);
      return false;
    }
  }

  function stop() {
    on = false;
    clearTimeout(timer);
    if (master) {
      const g = master; master = null;
      try {
        g.gain.setTargetAtTime(0, getCtx().currentTime, 0.18);
        setTimeout(() => { try { g.disconnect(); } catch(_) {} }, 600);
      } catch(_) {}
    }
  }

  return { start, stop, isOn: () => on };
})();

// ── BGM ボタン ────────────────────────────────────────────
function trackIndexOf(count) { return count===16 ? 0 : count===25 ? 1 : 2; }

bgmBtn.addEventListener('click', async () => {
  try { await ensureAudio(); } catch(e) { console.warn('Audio resume failed:', e); }
  bgmEnabled = !bgmEnabled;
  bgmBtn.classList.toggle('off', !bgmEnabled);

  if (playing) {
    // ゲーム中はリアルタイムで反映
    if (bgmEnabled) {
      const ok = BGMSystem.start(trackIndexOf(totalCount));
      if (!ok) { bgmEnabled = false; bgmBtn.classList.add('off'); }
    } else {
      BGMSystem.stop();
    }
  } else {
    if (!bgmEnabled) BGMSystem.stop();
    // ゲーム外でONにした時は短い確認音で「設定が有効」と知らせる
    if (bgmEnabled) { beep(660, 0.06, 'sine', 0.15); beep(880, 0.08, 'sine', 0.15, 0.08); }
  }
});

// ── モード / 配置 選択 ──────────────────────────────────
document.querySelectorAll('#mode-select .sel-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#mode-select .sel-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    totalCount = parseInt(btn.dataset.count);
    updateBestDisplay();
  });
});
document.querySelectorAll('#layout-select .sel-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#layout-select .sel-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    layoutMode = btn.dataset.layout;
  });
});

function updateBestDisplay() {
  const b = bests[totalCount];
  bestValue.textContent = b !== null ? b.toFixed(2) : '--';
}
updateBestDisplay();

// ── ユーティリティ ─────────────────────────────────────
function shuffle(arr) {
  for (let i=arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ── ボタン生成 ─────────────────────────────────────────
function createButton(n, cx, cy) {
  const R=26, btn=document.createElement('button');
  btn.className='num-btn'; btn.textContent=n; btn.dataset.num=n;
  btn.style.left=(cx-R)+'px'; btn.style.top=(cy-R)+'px';
  btn.addEventListener('pointerdown', e=>{ e.preventDefault(); handleTap(btn,n); });
  playArea.appendChild(btn);
}
function placeGrid(count) {
  const cols=Math.round(Math.sqrt(count)), rows=Math.ceil(count/cols);
  const W=playArea.clientWidth, H=playArea.clientHeight;
  const cW=W/cols, cH=H/rows;
  shuffle(Array.from({length:count},(_,i)=>i+1)).forEach((n,idx)=>
    createButton(n, cW*(idx%cols+.5), cH*(Math.floor(idx/cols)+.5)));
}
function placeRandom(count) {
  const cols=Math.round(Math.sqrt(count)), rows=Math.ceil(count/cols);
  const W=playArea.clientWidth, H=playArea.clientHeight;
  const cW=W/cols, cH=H/rows, R=26, P=4;
  shuffle(Array.from({length:count},(_,i)=>i)).forEach((s,idx)=>{
    const col=s%cols, row=Math.floor(s/cols);
    createButton(idx+1,
      cW*col+R+P + Math.random()*Math.max(0,cW-R*2-P*2),
      cH*row+R+P + Math.random()*Math.max(0,cH-R*2-P*2));
  });
}
function placeNumbers(count) {
  playArea.querySelectorAll('.num-btn').forEach(b=>b.remove());
  if (layoutMode==='grid') placeGrid(count); else placeRandom(count);
}

// ── タイマー ───────────────────────────────────────────
function startTimer() {
  startTime = performance.now();
  function tick() { timerDisplay.textContent=((performance.now()-startTime)/1000).toFixed(2); timerRAF=requestAnimationFrame(tick); }
  timerRAF = requestAnimationFrame(tick);
}
function stopTimer() {
  cancelAnimationFrame(timerRAF);
  return startTime !== null ? (performance.now()-startTime)/1000 : 0;
}

// ── タップ処理 ─────────────────────────────────────────
function handleTap(btn, n) {
  if (!playing) return;
  if (n === current) {
    btn.style.pointerEvents = 'none'; // アニメ中の二重タップを防止
    sfx.correct();
    btn.classList.add('correct');
    showHitEffect(btn);
    current++;
    updateHUD();
    btn.addEventListener('animationend',()=>btn.remove(),{once:true});
    if (current > totalCount) finishGame();
  } else {
    if (btn.classList.contains('wrong')) return;
    sfx.wrong();
    btn.classList.add('wrong');
    setTimeout(()=>btn.classList.remove('wrong'),380);
  }
}
function showHitEffect(btn) {
  const r=btn.getBoundingClientRect(), ar=playArea.getBoundingClientRect();
  const fx=document.createElement('div'); fx.className='hit-effect'; fx.textContent='✓';
  fx.style.left=(r.left-ar.left+r.width/2-12)+'px';
  fx.style.top=(r.top-ar.top-10)+'px';
  playArea.appendChild(fx);
  fx.addEventListener('animationend',()=>fx.remove(),{once:true});
}
function updateHUD() {
  nextNumber.textContent  = current<=totalCount ? current : '--';
  progressBar.style.width = ((current-1)/totalCount*100)+'%';
}

// ── ゲーム終了 ─────────────────────────────────────────
function finishGame() {
  playing = false;
  retireBtn.disabled = true;
  const elapsed = stopTimer();
  timerDisplay.textContent = elapsed.toFixed(2);

  BGMSystem.stop();
  sfx.finish();

  const isNewBest = bests[totalCount]===null || elapsed<bests[totalCount];
  if (isNewBest) { bests[totalCount]=elapsed; saveBests(); }
  updateBestDisplay();

  overlayTitle.textContent = '完了！';
  const bestHtml = isNewBest ? '<span class="new-best">★ ベスト更新！</span>' : '';
  overlayResult.innerHTML  = `<span class="result-time">${elapsed.toFixed(2)}秒</span>${bestHtml}`;
  startBtn.textContent     = 'もう一度';
  overlay.classList.remove('hidden');
}

// ── リタイア ────────────────────────────────────────────
function retireGame() {
  if (!playing && !starting) return;
  const wasPlaying = playing;
  playing = false;
  starting = false;
  cdToken++;           // カウントダウンを無効化（コールバックが発火しなくなる）
  countdownEl.classList.remove('show'); // カウントダウン表示を即座に消す
  retireBtn.disabled = true;
  startBtn.disabled = false;

  BGMSystem.stop();
  const elapsed = wasPlaying ? stopTimer() : (cancelAnimationFrame(timerRAF), 0);
  playArea.querySelectorAll('.num-btn').forEach(b => b.remove());

  overlayTitle.textContent = 'リタイア';
  overlayResult.innerHTML  = wasPlaying
    ? `<span class="result-time">${elapsed.toFixed(2)}秒</span><span style="color:#888">で中断</span>`
    : '<span style="color:#888">次はがんばろう！</span>';
  startBtn.textContent = 'もう一度';
  overlay.classList.remove('hidden');
}

retireBtn.addEventListener('click', retireGame);

// ── カウントダウン ─────────────────────────────────────
// cdToken を世代番号として使い、リタイア時にインクリメントすることで
// 進行中の animationend / setTimeout コールバックを無効化する
function runCountdown(cb) {
  const myToken = ++cdToken;
  const steps=['3','2','1','GO']; let i=0;
  function next() {
    if (cdToken !== myToken) return; // リタイア等で無効化されていたら即抜ける
    if (i>=steps.length) { cb(); return; }
    steps[i]==='GO' ? sfx.go() : sfx.tick();
    countdownEl.textContent=steps[i];
    countdownEl.classList.remove('show'); void countdownEl.offsetWidth;
    countdownEl.classList.add('show');
    countdownEl.addEventListener('animationend',()=>{
      i++;
      setTimeout(()=>{ if (cdToken===myToken) next(); }, 50);
    },{once:true});
  }
  next();
}

// ── ゲーム開始 ─────────────────────────────────────────
async function startGame() {
  if (starting || playing) return;
  starting = true;
  startBtn.disabled = true;

  try { await ensureAudio(); }
  catch(e) { console.warn('Audio init failed, continuing silently:', e); }

  retireBtn.disabled = false; // カウントダウン中からリタイア可能
  overlay.classList.add('hidden');
  current=1; progressBar.style.width='0%';
  nextNumber.textContent='1'; timerDisplay.textContent='0.00';

  placeNumbers(totalCount);
  playArea.querySelectorAll('.num-btn').forEach(b=>{ b.style.opacity='.25'; });

  runCountdown(() => {
    playArea.querySelectorAll('.num-btn').forEach(b=>{ b.style.opacity=''; });
    starting=false; startBtn.disabled=false;
    playing=true;
    startTimer();
    // カウントダウン完了後にBGM開始（ゲーム中のみ）
    if (bgmEnabled) {
      const ok = BGMSystem.start(trackIndexOf(totalCount));
      if (!ok) { bgmEnabled=false; bgmBtn.classList.add('off'); }
    }
  });
}

startBtn.addEventListener('click', startGame);

// リサイズ: playing/starting 中は無視
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{ if (playing||starting) return; },300);
});
</script>
