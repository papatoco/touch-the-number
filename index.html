<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タッチザナンバー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Arial', sans-serif;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: white;
      padding: 16px;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 12px;
      letter-spacing: 2px;
      color: #e0e0ff;
    }

    /* 難易度選択 */
    #difficulty {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .diff-btn {
      padding: 8px 20px;
      font-size: 1rem;
      border: 2px solid #0f3460;
      border-radius: 8px;
      background: #16213e;
      color: #a0c4ff;
      cursor: pointer;
      transition: all 0.2s;
    }

    .diff-btn:hover { background: #0f3460; }

    .diff-btn.active {
      background: #e94560;
      border-color: #e94560;
      color: white;
    }

    /* タイマー・次の数字 */
    #info {
      display: flex;
      gap: 32px;
      margin-bottom: 16px;
      font-size: 1.1rem;
    }

    #timer { color: #f0c040; font-weight: bold; font-size: 1.5rem; }
    #next-label { color: #a0c4ff; }
    #next-num { font-weight: bold; color: #ff9f9f; font-size: 1.5rem; }

    /* グリッド */
    #grid { display: grid; gap: 6px; }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      color: #e0e0ff;
    }

    .cell:hover { background: #0f3460; transform: scale(1.05); }

    .cell.done {
      background: #2d6a4f;
      border-color: #52b788;
      color: #b7e4c7;
      cursor: default;
      transform: none;
    }

    .cell.wrong {
      background: #7b2d2d;
      animation: shake 0.3s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    #message {
      margin-top: 16px;
      font-size: 1.3rem;
      color: #f0c040;
      height: 2rem;
      text-align: center;
    }

    #start-btn {
      margin-top: 12px;
      padding: 10px 36px;
      font-size: 1.1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #start-btn:hover { background: #c73652; }

    /* ランキング */
    #ranking {
      margin-top: 20px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 14px 24px;
      min-width: 260px;
    }

    #ranking h2 {
      font-size: 1rem;
      color: #a0c4ff;
      margin-bottom: 10px;
      text-align: center;
      letter-spacing: 1px;
    }

    #ranking ol {
      padding-left: 20px;
    }

    #ranking li {
      font-size: 1rem;
      color: #e0e0ff;
      padding: 3px 0;
    }

    #ranking li:first-child { color: #f0c040; font-weight: bold; }
    #ranking li:nth-child(2) { color: #c0c0c0; }
    #ranking li:nth-child(3) { color: #cd7f32; }

    .no-record { color: #555; font-size: 0.9rem; text-align: center; }
  </style>
</head>
<body>
  <h1>タッチザナンバー</h1>

  <div id="difficulty">
    <button class="diff-btn" onclick="setDifficulty('easy')">かんたん<br><small>3×3</small></button>
    <button class="diff-btn" onclick="setDifficulty('normal')">ふつう<br><small>4×4</small></button>
    <button class="diff-btn active" onclick="setDifficulty('hard')">むずかしい<br><small>5×5</small></button>
  </div>

  <div id="info">
    <div>タイム：<span id="timer">0.00</span> 秒</div>
    <div id="next-label">次の数字：<span id="next-num">1</span></div>
  </div>

  <div id="grid"></div>

  <div id="message">スタートボタンを押してください</div>
  <button id="start-btn" onclick="startGame()">スタート</button>

  <div id="ranking">
    <h2>ランキング</h2>
    <ol id="ranking-list"></ol>
  </div>

  <script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playHit(index) {
      const freq = 440 + index * 18;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.18);
    }

    function playWrong() {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(180, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    }

    function playFinish() {
      const notes = [523, 659, 784, 1047];
      notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.12);
        gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.12);
        gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + i * 0.12 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.12 + 0.3);
        osc.start(audioCtx.currentTime + i * 0.12);
        osc.stop(audioCtx.currentTime + i * 0.12 + 0.3);
      });
    }

    const DIFFICULTIES = {
      easy:   { size: 3, cellPx: 110, fontSize: '2rem' },
      normal: { size: 4, cellPx: 95,  fontSize: '1.8rem' },
      hard:   { size: 5, cellPx: 85,  fontSize: '1.6rem' },
    };

    let currentDiff = 'hard';
    let nextNumber = 1;
    let startTime = null;
    let timerInterval = null;
    let gameActive = false;

    function setDifficulty(diff) {
      if (gameActive) return;
      currentDiff = diff;
      document.querySelectorAll('.diff-btn').forEach((btn, i) => {
        btn.classList.toggle('active', ['easy', 'normal', 'hard'][i] === diff);
      });
      updateRanking();
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function buildGrid() {
      const { size, cellPx, fontSize } = DIFFICULTIES[currentDiff];
      const total = size * size;
      const grid = document.getElementById('grid');
      grid.style.gridTemplateColumns = `repeat(${size}, ${cellPx}px)`;
      grid.style.gridTemplateRows = `repeat(${size}, ${cellPx}px)`;
      grid.innerHTML = '';

      const numbers = shuffle([...Array(total)].map((_, i) => i + 1));
      numbers.forEach(n => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.style.width = cellPx + 'px';
        cell.style.height = cellPx + 'px';
        cell.style.fontSize = fontSize;
        cell.textContent = n;
        cell.dataset.num = n;
        cell.addEventListener('click', () => onCellClick(cell, n));
        grid.appendChild(cell);
      });
    }

    function onCellClick(cell, num) {
      if (!gameActive) return;
      const total = DIFFICULTIES[currentDiff].size ** 2;

      if (num === nextNumber) {
        cell.classList.add('done');
        playHit(nextNumber);
        nextNumber++;
        document.getElementById('next-num').textContent = nextNumber <= total ? nextNumber : '完了！';
        if (nextNumber > total) finishGame();
      } else {
        playWrong();
        cell.classList.add('wrong');
        setTimeout(() => cell.classList.remove('wrong'), 300);
      }
    }

    function startGame() {
      clearInterval(timerInterval);
      nextNumber = 1;
      gameActive = true;
      const total = DIFFICULTIES[currentDiff].size ** 2;
      document.getElementById('next-num').textContent = '1';
      document.getElementById('message').textContent = '1 から順番にタップ！';
      document.getElementById('timer').textContent = '0.00';
      buildGrid();

      startTime = Date.now();
      timerInterval = setInterval(() => {
        document.getElementById('timer').textContent =
          ((Date.now() - startTime) / 1000).toFixed(2);
      }, 50);
    }

    function finishGame() {
      clearInterval(timerInterval);
      gameActive = false;
      const elapsed = parseFloat(((Date.now() - startTime) / 1000).toFixed(2));
      document.getElementById('timer').textContent = elapsed.toFixed(2);
      playFinish();

      saveRecord(elapsed);
      const best = getRanking()[0];
      if (elapsed === best) {
        document.getElementById('message').textContent = `クリア！新記録 ${elapsed} 秒！🎉`;
      } else {
        document.getElementById('message').textContent = `クリア！${elapsed} 秒（ベスト：${best} 秒）`;
      }
      updateRanking();
    }

    // ローカルストレージ操作
    function storageKey() { return `ttn_ranking_${currentDiff}`; }

    function getRanking() {
      return JSON.parse(localStorage.getItem(storageKey()) || '[]');
    }

    function saveRecord(time) {
      const records = getRanking();
      records.push(time);
      records.sort((a, b) => a - b);
      localStorage.setItem(storageKey(), JSON.stringify(records.slice(0, 5)));
    }

    function updateRanking() {
      const records = getRanking();
      const list = document.getElementById('ranking-list');
      const labels = { easy: 'かんたん', normal: 'ふつう', hard: 'むずかしい' };
      document.querySelector('#ranking h2').textContent =
        `ランキング（${labels[currentDiff]}）`;

      if (records.length === 0) {
        list.innerHTML = '<p class="no-record">まだ記録がありません</p>';
        return;
      }
      list.innerHTML = records
        .map((t, i) => `<li>${i + 1}位　${t.toFixed(2)} 秒</li>`)
        .join('');
    }

    // 初期化
    updateRanking();
  </script>
</body>
</html>
